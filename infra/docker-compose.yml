services:
  # --- Central Bus ---
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: soms-mqtt
    restart: always
    ports:
      - "${MQTT_BIND_ADDR:-127.0.0.1}:${SOMS_PORT_MQTT:-1883}:1883" # Exposed for Edge Devices
      - "${MQTT_BIND_ADDR:-127.0.0.1}:${SOMS_PORT_MQTT_WS:-9001}:9001" # Websocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - soms_mqtt_data:/mosquitto/data
      - soms_mqtt_log:/mosquitto/log
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USER:-soms} -P ${MQTT_PASS:-soms_dev_mqtt} -t '$$SYS/broker/version' -C 1 -W 5 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # --- Central Intelligence (Brain) ---
  # NOTE: In a distributed setup, this might run elsewhere.
  # Here we assume it runs alongside the bus.
  brain:
    build: ../services/brain
    container_name: soms-brain
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
      - LOG_LEVEL=INFO
      - LLM_API_URL=${LLM_API_URL:-http://llm:8080/v1}
      - LLM_MODEL=${LLM_MODEL}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soms}:${POSTGRES_PASSWORD:-soms_dev_password}@postgres:5432/soms
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - CHARACTER_ID=${CHARACTER_ID:-otomachi_una}
      - CONFIG_DIR=/app/config
    volumes:
      - ../services/brain/src:/app
      - ../config:/app/config:ro
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('mosquitto',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: soms-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-soms}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-soms_dev_password}
      - POSTGRES_DB=soms
    ports:
      - "127.0.0.1:${SOMS_PORT_POSTGRES:-5432}:5432"
    volumes:
      - soms_pg_data:/var/lib/postgresql/data
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soms} -d soms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Dashboard Backend ---
  backend:
    build: ../services/dashboard/backend
    container_name: soms-backend
    restart: always
    ports:
      - "${SOMS_PORT_BACKEND:-8000}:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../services/dashboard/backend:/app
      - ../config:/app/config
      - ../services/zigbee2mqtt/data:/app/z2m-data:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soms}:${POSTGRES_PASSWORD:-soms_dev_password}@postgres:5432/soms
      - MQTT_BROKER=mosquitto
      - JWT_SECRET=${JWT_SECRET:-soms_dev_jwt_secret_change_me}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - SOMS_ENV=${SOMS_ENV:-development}
      - BRAIN_URL=${BRAIN_URL:-http://brain:8080}
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: services/dashboard/frontend/Dockerfile
    container_name: soms-frontend
    restart: always
    ports:
      - "${SOMS_PORT_FRONTEND:-80}:80"
      - "${SOMS_PORT_FRONTEND_HTTPS:-8444}:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --no-check-certificate https://127.0.0.1:443/ || wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- VOICEVOX Engine ---
  voicevox:
    build: ../services/voice/voicevox
    container_name: soms-voicevox
    restart: always
    ports:
      - "50021:50021"
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50021' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # --- Voice Service ---
  voice-service:
    build: ../services/voice
    container_name: soms-voice
    restart: always
    ports:
      - "${SOMS_PORT_VOICE:-8002}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VOICEVOX_URL=http://voicevox:50021
      - LLM_API_URL=${VOICE_LLM_API_URL:-http://llm:8080/v1}
      - LLM_MODEL=${VOICE_LLM_MODEL:-qwen3.5:9b}
      - TTS_BACKEND=${TTS_BACKEND:-voicepeak}
      - VOICEPEAK_BRIDGE_URL=${VOICEPEAK_BRIDGE_URL:-http://host.docker.internal:18100}
      - VOICEPEAK_NARRATOR=${VOICEPEAK_NARRATOR:-Otomachi Una}
    volumes:
      - ../services/voice/src:/app
      - soms_audio_data:/app/audio
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Auth Service ---
  auth:
    build: ../services/auth
    container_name: soms-auth
    restart: always
    ports:
      - "127.0.0.1:${SOMS_PORT_AUTH:-8006}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soms}:${POSTGRES_PASSWORD:-soms_dev_password}@postgres:5432/soms
      - JWT_SECRET=${JWT_SECRET:-soms_dev_jwt_secret_change_me}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - AUTH_BASE_URL=${AUTH_BASE_URL:-https://localhost:8443/api/auth}
      - FRONTEND_URL=${FRONTEND_URL:-https://localhost:8443}
      - SOMS_ENV=${SOMS_ENV:-development}
    volumes:
      - ../services/auth/src:/app
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Local LLM Engine (llama.cpp server) ---
  # Continuous batching for parallel throughput (Brain + Voice + Perception)
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile.rocm
    image: soms-llama-server:rocm
    container_name: soms-llm
    restart: always
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128
    ports:
      - "${SOMS_PORT_LLM:-11434}:8080"
    volumes:
      - ${LLM_MODEL_PATH:-./llm/models}:/models:ro
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.1
      - HSA_ENABLE_SDMA=0
      - GPU_COREDUMP_ENABLE=0
      - HIPBLASLT_TENSILE_LIBPATH=/dev/null
    command: >
      --model /models/${LLM_MODEL_FILE:-qwen3.5-9b-q4km.gguf}
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size ${LLM_CTX_SIZE:-32768}
      --parallel ${LLM_PARALLEL:-4}
      --cont-batching
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --reasoning-budget 0
    ulimits:
      core: 0
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Mock LLM for development/testing
  mock-llm:
    build: ./mock_llm
    container_name: soms-mock-llm
    restart: unless-stopped
    ports:
      - "${SOMS_PORT_MOCK_LLM:-8001}:8000"
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- SwitchBot Cloud Bridge ---
  switchbot:
    build: ../services/switchbot
    container_name: soms-switchbot
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
      - SWITCHBOT_TOKEN=${SWITCHBOT_TOKEN}
      - SWITCHBOT_SECRET=${SWITCHBOT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../services/switchbot/src:/app
      - ../config:/app/config:ro
    ports:
      - "${SOMS_PORT_SWITCHBOT_WEBHOOK:-8005}:8005"
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('mosquitto',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- WiFi Pose Service ---
  wifi-pose:
    build: ../services/wifi-pose
    container_name: soms-wifi-pose
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
    volumes:
      - ../services/wifi-pose/src:/app
      - ../services/wifi-pose/config:/app/config
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('mosquitto',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Zigbee2MQTT Coordinator ---
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    container_name: soms-zigbee2mqtt
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
    ports:
      - "${SOMS_PORT_Z2M_FRONTEND:-8008}:8080"
    volumes:
      - ../services/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0:/dev/ttyUSB0
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --- Zigbee2MQTT Bridge (Topic Translator) ---
  zigbee2mqtt-bridge:
    build: ../services/zigbee2mqtt-bridge
    container_name: soms-z2m-bridge
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
      zigbee2mqtt:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_URL=http://backend:8000
    volumes:
      - ../services/zigbee2mqtt-bridge/src:/app
      - ../config:/app/config:ro
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('mosquitto',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Anomaly Detection ---
  anomaly:
    build: ../services/anomaly
    container_name: soms-anomaly
    restart: always
    ports:
      - "127.0.0.1:${SOMS_PORT_ANOMALY:-8009}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-soms}:${POSTGRES_PASSWORD:-soms_dev_password}@postgres:5432/soms
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
    volumes:
      - ../services/anomaly/src:/app
      - ../config:/app/config:ro
      - soms_anomaly_models:/app/model_store
    networks:
      - soms-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  # --- Perception Node ---
  # Uses host networking for direct access to RTSP cameras and GPU devices
  # on the local network. Cannot use soms-net bridge (no `networks:` key).
  # MQTT_BROKER must be set to 'localhost' (not 'mosquitto') accordingly.
  perception:
    build: ../services/perception
    container_name: soms-perception
    restart: always
    depends_on:
      mosquitto:
        condition: service_healthy
    network_mode: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128
      # Uncomment when a USB webcam is plugged into the host (drives the
      # dashboard EngagementMonitor). Leaving this active without /dev/video0
      # present will prevent the container from starting.
      # - /dev/video0:/dev/video0
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    volumes:
      - ../services/perception/src:/app/src
      - ../config:/config:ro
    environment:
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soms}
      - MQTT_PASS=${MQTT_PASS:-soms_dev_mqtt}
      - HSA_OVERRIDE_GFX_VERSION=12.0.1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',1883),5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- Speech-to-Text (kotoba-whisper + PyTorch ROCm) ---
  stt:
    build:
      context: ..
      dockerfile: services/stt/Dockerfile
    container_name: soms-stt
    restart: unless-stopped
    environment:
      - STT_MODEL=${STT_MODEL:-kotoba-tech/kotoba-whisper-v2.0}
      - HSA_OVERRIDE_GFX_VERSION=12.0.1
    volumes:
      - stt_models:/root/.cache/huggingface
      - ../services/stt/src:/app
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # --- Admin Panel ---
  admin-frontend:
    build:
      context: ..
      dockerfile: services/admin/frontend/Dockerfile
    container_name: soms-admin
    restart: always
    ports:
      - "${SOMS_PORT_ADMIN:-8007}:80"
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - soms-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  soms_mqtt_data:
  soms_mqtt_log:
  soms_pg_data:
  soms_audio_data:
  soms_anomaly_models:
  stt_models:


networks:
  soms-net:
    driver: bridge
