services:
  # --- llama.cpp server (ROCm) ---
  # Continuous batching + flash attention for parallel throughput
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: soms-llama-server:rocm
    container_name: soms-llama-server
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.1
      - HSA_ENABLE_SDMA=0
      - GPU_COREDUMP_ENABLE=0
      - HIPBLASLT_TENSILE_LIBPATH=/dev/null
    command: >
      --model /models/qwen3.5-9b-q4km.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --ctx-size 8192
      --parallel 4
      --cont-batching
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
    ulimits:
      core: 0

