devices:
  z2m_lux_01:
    zone: zone_kjo92k
    position:
    - 17.19
    - 7.51
    type: illuminance
    channels:
    - illuminance
    label: 照度センサー
    context: 神保さん前ソファエリアの照度センサー。自然光と照明の明るさを計測し、作業環境の快適性評価に使用
  z2m_auto_dd1c6e60:
    zone: zone_jss75e
    position:
    - 29.25
    - 7.59
    type: generic_sensor,temp_humidity
    channels:
    - temperature
    - humidity
    label: Z2M Temp&hum1
    context: 17号沿いエリアの温湿度センサー。建物東端で外気の影響を受けやすく、季節変動の指標となる
  z2m_motion_01:
    zone: zone_4d0rct
    position:
    - 22.34
    - 12.92
    type: motion
    channels:
    - motion
    - illuminance
    orientation_deg: -144.0
    fov_deg: 120.0
    detection_range_m: 3.0
    label: 出入り検知センサー
    context: エントランス天井に設置されたモーションセンサー。来客や社員の入退室を検知。FOV 120度、検知範囲3m。照度も計測
  z2m_presence_01:
    zone: zone_4d0rct
    position:
    - 22.22
    - 11.78
    type: presence
    channels:
    - motion
    orientation_deg: -117.0
    fov_deg: 120.0
    detection_range_m: 2.5
    label: 入口滞在センサー
    context: エントランスの在室検知センサー。入口付近の滞在を検出し、受付対応の必要性判断に使用。検知範囲2.5m
  z2m_auto_90e1f7ce:
    zone: zone_jss75e
    position:
    - 29.28
    - 8.08
    type: temp_humidity
    channels:
    - temperature
    - humidity
    label: Z2M Temp&hum2
    context: 17号沿いエリアの温湿度センサー（2台目）。Temp&hum1と組み合わせてエリア内の温湿度分布を把握
  z2m_auto_eb32da9c:
    zone: zone_kjo92k
    position:
    - 16.68
    - 7.54
    type: illuminance,temp_humidity,presence
    channels:
    - illuminance
    - temperature
    - humidity
    - motion
    orientation_deg: 92.0
    fov_deg: 120.0
    detection_range_m: 4.5
    label: Z2M 10GhzSensor1
    context: 神保さん前ソファエリアの多機能センサー（10GHz mmWave）。照度・温湿度・在室をひとつで計測。検知範囲4.5mで広域カバー
  z2m_auto_b4a972c2:
    zone: zone_jss75e
    position:
    - 29.3
    - 7.06
    type: vibration
    channels:
    - motion
    label: Z2M VibSensor1
    context: 17号沿いエリアの振動センサー。機器の稼働状態や異常振動の検出に使用
  z2m_auto_630150a6:
    zone: zone_2dui7k
    position:
    - 26.82
    - 6.28
    type: water_leak
    channels:
    - water_leak
    label: Z2M water_leak1
    context: 淡水栽培エリアの漏水センサー。水耕栽培設備からの水漏れを即時検知し、設備損傷を防止
  z2m_auto_ccde0851:
    zone: zone_2dui7k
    position:
    - 26.55
    - 5.6
    type: soil,temp_humidity
    channels:
    - temperature
    - humidity
    label: Z2M Soilsensor3
    context: 淡水栽培エリアの土壌センサー（3号機）。水耕栽培の水温と水分レベルを監視。植物の生育環境管理
  z2m_auto_07db1b9d:
