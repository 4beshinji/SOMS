    position:
    - 26.55
    - 5.19
    type: soil,temp_humidity
    channels:
    - temperature
    - humidity
    label: Z2M Soilsensor2
    context: 淡水栽培エリアの土壌センサー（2号機）。水耕栽培の水温と水分レベルを監視。Soilsensor1,3と合わせて栽培床全体をカバー
