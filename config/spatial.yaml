# ArUco marker world coordinates (floor-plane meters)
# Each marker has 4 corners in order: top-left, top-right, bottom-right, bottom-left
# Use DICT_4X4_50 (marker IDs 0-49)
# Place at least 4 markers within each camera's FOV for calibration
