# PrusaSlicer profile for Ender 3 KE + PLA
# Nozzle: 0.4mm (stock)

# Printer
bed_shape = 0x0,220x0,220x220,0x220
nozzle_diameter = 0.4
gcode_flavor = klipper
printer_model =

# Layer
layer_height = 0.2
first_layer_height = 0.2

# Perimeters (wall = 1.6mm = 4 perimeters)
perimeters = 4
top_solid_layers = 5
bottom_solid_layers = 4

# Infill
fill_density = 20%
fill_pattern = gyroid

# Temperature — PLA
temperature = 205
first_layer_temperature = 210
bed_temperature = 60
first_layer_bed_temperature = 60

# Filament
filament_diameter = 1.75
filament_type = PLA

# Speed (Ender 3 KE Klipper)
perimeter_speed = 150
infill_speed = 150
first_layer_speed = 50
travel_speed = 250
support_material_speed = 80

# Retraction
retract_length = 0.8
retract_speed = 40
retract_lift = 0.2

# Support
support_material = 0

# Skirt
skirts = 2
skirt_distance = 5

# Start G-code
start_gcode = START_PRINT EXTRUDER_TEMP=[first_layer_temperature] BED_TEMP=[first_layer_bed_temperature]

# End G-code
end_gcode = END_PRINT
