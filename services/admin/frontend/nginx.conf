server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/ {
        resolver 127.0.0.11 valid=30s;
        set $auth_upstream http://auth:8000;
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 8k;
    }

    location /api/anomaly/ {
        resolver 127.0.0.11 valid=30s;
        set $anomaly_upstream http://anomaly:8000;
        rewrite ^/api/anomaly/(.*) /$1 break;
        proxy_pass $anomaly_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/voice/ {
        resolver 127.0.0.11 valid=30s;
        set $voice_upstream http://voice-service:8000;
        rewrite ^/api/voice/(.*) /api/voice/$1 break;
        proxy_pass $voice_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/cameras/ {
        # Perception runs on host network (not in soms-net)
        rewrite ^/api/cameras/(.+)$ /cameras/$1 break;
        rewrite ^/api/cameras/?$ /cameras break;
        proxy_pass http://172.17.0.1:8019;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location /api/tracking/ {
        # Live tracking data direct from perception (no DB round-trip)
        rewrite ^/api/tracking/(.+)$ /tracking/$1 break;
        proxy_pass http://172.17.0.1:8019;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
