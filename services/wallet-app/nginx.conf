server {
    listen 80;
    listen 443 ssl;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Allow camera access (required for QR code scanning)
    add_header Permissions-Policy "camera=*" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/ {
        resolver 127.0.0.11 valid=30s;
        set $auth_upstream http://auth:8000;
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 8k;
    }

    location /api/wallet/ {
        resolver 127.0.0.11 valid=30s;
        set $wallet_upstream http://wallet:8000;
        rewrite ^/api/wallet/(.*) /$1 break;
        proxy_pass $wallet_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
