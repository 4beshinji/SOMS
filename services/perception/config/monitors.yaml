discovery:
  enabled: true
  network: "192.168.128.0/24"
  scan_range: [160, 200]
  timeout: 3.0
  verify_yolo: false
  default_interval_sec: 30.0
  exclude_ips:
    - "192.168.128.1"
    - "192.168.128.161"
    # Exclude all static monitor cameras
    - "192.168.128.172"
    - "192.168.128.173"
    - "192.168.128.177"
    - "192.168.128.178"
    - "192.168.128.162"
    - "192.168.128.164"
    - "192.168.128.166"
    - "192.168.128.175"
    - "192.168.128.167"
    - "192.168.128.168"
    - "192.168.128.171"
    - "192.168.128.174"
    - "192.168.128.179"
  zone_map:
    "192.168.128.172": "zone_6wpk8l"
    "192.168.128.173": "meeting_room_b"
    "192.168.128.177": "desk_area_a"
    "192.168.128.178": "entrance"
    "192.168.128.162": "cam_192_168_128_162"
    "192.168.128.164": "cam_192_168_128_164"
    "192.168.128.166": "cam_192_168_128_166"
    "192.168.128.175": "zone_gu4bzs"
    "192.168.128.167": "cam_192_168_128_167"
    "192.168.128.168": "cam_192_168_128_168"
    "192.168.128.171": "cam_192_168_128_171"
    "192.168.128.174": "cam_192_168_128_174"
    "192.168.128.179": "cam_192_168_128_179"

fall_detection:
  enabled: true
  torso_angle_threshold: 60.0
  fall_confidence_threshold: 0.5
  confirmation_sec: 5.0
  recovery_sec: 10.0
  alert_cooldown_sec: 120.0
  furniture_iou_threshold: 0.15
  transition_window_sec: 1.0

yolo:
  model: yolo11s.pt
  pose_model: yolo11s-pose.pt
  device: 0  # GPU 0

mqtt:
  broker: localhost
  port: 1883

vlm:
  enabled: false
  api_url: "http://localhost:11434"
  model: "qwen3-vl:8b"
  api_style: "ollama"
  timeout_sec: 30
  cooldowns:
    scene: 300
    occupancy_change: 60
    fall_candidate: 30
    unusual_activity: 300
  periodic:
    enabled: true
    interval_sec: 300

tracking:
  enabled: true
  tracker: botsort.yaml
  reid_model: osnet_x0_5
  publish_interval_sec: 5.0
  min_crop_height_px: 50
  min_crop_width_px: 25
  min_reid_confidence: 0.4
  embedding_alpha: 0.15
  calibration:
    auto_calibrate: true
    cache_path: /app/config/calibration_cache.json
    aruco_dict: DICT_4X4_50
    min_markers: 4
  association:
    reid_weight: 0.2
    spatial_weight: 0.5
    temporal_weight: 0.3
    match_threshold: 0.2
    spatial_gate_m: 6.0
    temporal_gate_s: 60.0
    tracklet_timeout_s: 120.0
    global_track_timeout_s: 300.0
    min_hits_for_global: 1
    min_age_s_for_global: 0.0
    reid_match_threshold: 0.3
    merge_check_interval_s: 1.0
    merge_threshold: 0.2
    merge_spatial_gate_m: 6.0
    merge_spatial_coeff: 1.0
  cameras:
    - camera_id: cam_192_168_128_162
      zone_name: cam_192_168_128_162
    - camera_id: cam_192_168_128_166
      zone_name: cam_192_168_128_166
    - camera_id: cam_192_168_128_177
      zone_name: desk_area_a
