monitors:
  - name: occupancy_meeting_room
    type: OccupancyMonitor
    camera_id: camera_node_01
    zone_name: meeting_room_a
    enabled: true

  - name: whiteboard_meeting_room
    type: WhiteboardMonitor
    camera_id: camera_node_01
    zone_name: meeting_room_a
    enabled: true

discovery:
  enabled: true
  network: "192.168.128.0/24"
  timeout: 3.0
  verify_yolo: true
  default_interval_sec: 10.0
  exclude_ips:
    - "192.168.128.1"
    - "192.168.128.161"
  zone_map:
    "192.168.128.172": "kitchen"
    "192.168.128.173": "meeting_room_b"
    "192.168.128.177": "desk_area_a"
    "192.168.128.178": "entrance"

fall_detection:
  enabled: true
  torso_angle_threshold: 60.0
  fall_confidence_threshold: 0.5
  confirmation_sec: 5.0
  recovery_sec: 10.0
  alert_cooldown_sec: 120.0
  furniture_iou_threshold: 0.15
  transition_window_sec: 1.0

yolo:
  model: yolo11s.pt
  pose_model: yolo11s-pose.pt
  device: 0  # GPU 0

mqtt:
  broker: localhost
  port: 1883

tracking:
  enabled: false  # torchreid not available in ROCm base image yet
  tracker: botsort.yaml
  reid_model: osnet_x0_5
  publish_interval_sec: 0.5
  calibration:
    auto_calibrate: true
    cache_path: /app/config/calibration_cache.json
    aruco_dict: DICT_4X4_50
    min_markers: 4
  association:
    reid_weight: 0.5
    spatial_weight: 0.3
    temporal_weight: 0.2
    match_threshold: 0.5
    spatial_gate_m: 5.0
    temporal_gate_s: 30.0
    tracklet_timeout_s: 60.0
    global_track_timeout_s: 300.0
  cameras:
    - camera_id: cam_192_168_128_172
      zone_name: kitchen
    - camera_id: cam_192_168_128_178
      zone_name: entrance
