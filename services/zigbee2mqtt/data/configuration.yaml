homeassistant:
  enabled: false
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto:1883
  user: soms
  password: soms_dev_mqtt
serial:
  port: /dev/ttyUSB0
  adapter: zstack
frontend:
  enabled: true
  port: 8080
availability:
  active:
    timeout: 600
  passive:
    timeout: 1800
advanced:
  log_level: info
  network_key:
    - 146
    - 59
    - 116
    - 237
    - 56
    - 74
    - 4
    - 155
    - 60
    - 78
    - 110
    - 110
    - 178
    - 107
    - 2
    - 103
  pan_id: 48362
